<!DOCTYPE html>
<html lang="te">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>మన జాతకం</title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

  <main class="page-wrapper">

    <section class="jathakam-container">

      <div class="page-heading">

        <div class="heading-icon">
          📜
        </div>

        <div>
          <h1>మన జాతకం</h1>

          <p>
            జన్మ వివరాలు నమోదు చేసి జాతకం తయారు చేయండి
          </p>
        </div>

      </div>

      <div class="form-card">

        <div class="form-group">

          <label for="name">
            👤 పూర్తి పేరు
          </label>

          <input
            type="text"
            id="name"
            placeholder="పూర్తి పేరు నమోదు చేయండి"
            autocomplete="name"
          >

        </div>

        <div class="form-group">

          <label for="gender">
            🚻 లింగం
          </label>

          <select id="gender">

            <option value="">
              లింగం ఎంచుకోండి
            </option>

            <option value="పురుషుడు">
              పురుషుడు
            </option>

            <option value="స్త్రీ">
              స్త్రీ
            </option>

          </select>

        </div>

        <div class="form-group">

          <label for="dob">
            📅 పుట్టిన తేదీ
          </label>

          <input
            type="date"
            id="dob"
          >

        </div>

        <div class="form-group">

          <label for="tob">
            🕒 పుట్టిన సమయం
          </label>

          <input
            type="time"
            id="tob"
          >

        </div>

        <div class="form-group">

          <label for="place">
            📍 పుట్టిన స్థలం
          </label>

          <input
            type="text"
            id="place"
            placeholder="ఉదా: తాడిపత్రి"
            autocomplete="address-level2"
          >

        </div>

        <button
          type="button"
          class="primary-button"
          onclick="generateJathakam()"
        >
          📜 జాతకం తయారు చేయి
        </button>

        <button
          type="button"
          class="secondary-button"
          onclick="goHome()"
        >
          🏠 హోమ్
        </button>

      </div>

      <div
        id="loading"
        class="loading-card"
        style="display: none;"
      >

        <div class="loader"></div>

        <p>
          జాతకం తయారవుతోంది...
        </p>

      </div>

      <section
        id="result"
        class="result-area"
        aria-live="polite"
      >
      </section>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
