<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>జాతకం</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📜 జాతకం</h1>
  <label><b>🌐 భాష ఎంచుకోండి</b></label>

<select id="language">
  <option value="te">తెలుగు</option>
  <option value="en">English</option>
  <option value="hi">हिन्दी</option>
  <option value="ta">தமிழ்</option>
  <option value="kn">ಕನ್ನಡ</option>
  <option value="ml">മലയാളം</option>
  <option value="mr">मराठी</option>
  <option value="gu">ગુજરાતી</option>
  <option value="bn">বাংলা</option>
  <option value="or">ଓଡ଼ିଆ</option>
  <option value="pa">ਪੰਜਾਬੀ</option>
</select>

<input type="text" id="name" placeholder="పేరు">

<select id="gender">
<option value="పురుషుడు">పురుషుడు</option>
<option value="స్త్రీ">స్త్రీ</option>
</select>

<input type="date" id="dob">

<input type="time" id="tob">

<input type="text" id="place" placeholder="పుట్టిన స్థలం">

  <button onclick="alert('పని చేస్తోంది'); generateJathakam();">
జాతకం తయారు చేయి
</button>

<button onclick="shareJathakam()">
WhatsApp Share
</button>

<div id="loading" style="display:none;">
⏳ లోడ్ అవుతోంది...
</div>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
