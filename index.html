<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>మన జాతకం</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🙏 మన జాతకం</h1>

<label>పేరు</label>
<input type="text" id="name" placeholder="మీ పేరు">

<label>లింగం</label>
<select id="gender">
<option>పురుషుడు</option>
<option>స్త్రీ</option>
</select>

<label>పుట్టిన తేదీ</label>
<input type="date" id="dob">

<label>పుట్టిన సమయం</label>
<input type="time" id="time">

<label>పుట్టిన స్థలం</label>
<input type="text" id="place" placeholder="ఉదా: తాడిపత్రి">

<button onclick="showMessage()">జాతకం చూపించండి</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
